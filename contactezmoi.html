<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>
     <!-- Main Navigation Menu -->
    <header>
        <header>
       <p align="center">
            <b style="color: rgba(5, 110, 126, 0.679); font-weight: bold; margin: 30px;">
                <a href="index.html" target="_self">
                    Home
                </a>
            </b>
            <b style="color: rgba(5, 110, 126, 0.679); font-weight: bold; margin: 30px;">
                <a href="contactezmoi.html" target="_blank">
                    Contact Me
                </a>
            </b>
       </p>
    </header>
    </header>

    <hr size="3" color="green">

    <main>
        <section>
            <h1 align="center">Get In Touch</h1>
            <p align="center">Have a question or want to work together? Leave your details below!</p>
        </section>

        <!-- Simple Contact Form -->
        <section>
            <table align="center" cellpadding="5">
                <tr>
                    <td>
                        <form action="#" method="POST">
                            <p>
                                <label for="fullName">Full Name/Nom et prénom:</label><br>
                                <input type="text" id="fullName" name="fullName" required placeholder="Lincoln Alexander">
                            </p>

                            <p>
                                <label for="emailAddress">Email Address/Adresse courriel:</label><br>
                                <input type="email" id="emailAddress" name="emailAddress" required
                                    placeholder="lincoln@hooray.ca">
                            </p>

                            <p>
                                <label for="userMessage">Your Message/Votre message:</label><br>
                                <textarea id="userMessage" name="userMessage" rows="5" cols="40" required
                                    placeholder="Type your message here..."></textarea>
                            </p>

                            <p>
                                <input type="submit" value="Send Message">
                            </p>
                        </form>
                    </td>
                </tr>
            </table>
        </section>
    </main>

    <hr size="3" color="blue">
    <footer>
        <p align="center"><small>&copy; 2026 CJ Agwaziam. Built at TechSummer 2026.</small></p>
    </footer> 
</body>
</html>
